name: jupyter

channels:
  - pytorch
  - nvidia
  - anaconda
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11.13
  - pip
  - conda-forge::setuptools=78.1.1
  - nodejs=18.18.2
  - pytorch=2.2.2
  - torchvision=0.17.2
  - skorch=0.15.0
  - numpy=1.26.4
  - scipy=1.15.3
  - matplotlib=3.8.4
  - scikit-learn=1.4.2
  - pandas=2.1.4
  - py-xgboost-cpu=2.1.4
  - jupyterlab=4.0.11
  - ipywidgets
  - jupyterlab_widgets
  - texlive-core
  - pyts
  - h5py=3.14.0
  - joblib=1.3.2
  - dask=2025.2.0
  - dvc=3.67.1
  - conda-forge::pycares=4.10.0
  - multiprocess
  - pip:
      - ydata_profiling~=4.12.1
      - seaborn==0.13.2
      - Pillow~=11.0.0
      - openpyxl
      - lightning~=2.2
      - lightning-bolts
      - torch-metrics
      - torchinfo
      - pre-commit
      - ruff
      - SciencePlots~=2.1
      - humanize
      - tensorflow[and-cuda]~=2.16.1; platform_system == "Linux"
      - tensorflow~=2.16.1; platform_system != "Linux"
      - keras~=3.5.0
      - autokeras~=2.0.0
      - scikeras
