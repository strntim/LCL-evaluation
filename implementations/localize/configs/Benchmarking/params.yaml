# 04-Added_automl_model
evaluation:
  metrics: {'rmse': False, 'r_squared': True}
  save_top_models: 0.1
  score_with: 'rmse'

split:
  types: [KFold, Random]
  seed: 42
  n_splits: 5
  test_size: 0.20

gridsearch:
  RandomForestRegressor:
    module: sklearn.ensemble
    class: RandomForestRegressor
    parameters:
      random_state: 42
      n_jobs: -1
    hyperparameters:
      n_estimators: [10, 50, 100, 250, 400]
      max_depth: [5, 10, 30, 50, 150, 200, null]

  KNeighborsRegressor:
    module: sklearn.neighbors
    class: KNeighborsRegressor
    parameters:
      n_jobs: -1
    hyperparameters:
      n_neighbors: [3, 5, 10]
      weights: [uniform, distance]
      p: [1, 2]
      leaf_size: [10, 15, 30]
      metric: [minkowski, euclidean]

automl:
  ExampleModel:
    inputs:
      - name: data_input

    outputs:
      - name: x_out
      - name: y_out

    settings:
      seed: 42
      max_trials: 10
      overwrite: True

    fit_settings:
      verbose: 2